# The eslint/prettier hooks below run as local Node hooks (needing the project
# toolchain). They are fragile to provision in the pre-commit.ci sandbox and are
# already enforced by the GitHub CI (`npm run lint` / `npm run format:check`), so
# we skip them in the cloud runner while keeping them for local `prek`/pre-commit.
ci:
  skip: [eslint, prettier, typecheck, dist-sync]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: eslint
        name: eslint
        entry: eslint
        language: node
        files: ^(src|test)/.*\.ts$
        additional_dependencies:
          - eslint@10.6.0
          - typescript@6.0.3
          - typescript-eslint@8.62.0

      - id: prettier
        name: prettier
        entry: prettier --check
        language: node
        files: ^(src|test)/.*\.(ts|json)$
        additional_dependencies:
          - prettier@3.9.1

      - id: typecheck
        name: typecheck (tsc --noEmit)
        entry: npm run typecheck
        language: system
        pass_filenames: false
        files: \.ts$
      - id: dist-sync
        name: dist/ up to date (rebuild + verify)
        entry: bash -c 'npm run build && git diff --quiet -- dist/'
        language: system
        pass_filenames: false
        files: ^src/.*\.ts$
