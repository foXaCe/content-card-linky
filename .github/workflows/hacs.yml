name: HACS Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hacs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hacs:
    name: HACS Action
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: HACS Action
        uses: hacs/action@22.5.0
        with:
          category: plugin
          ignore: brands
