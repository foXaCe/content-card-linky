name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, Format, Test & Build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Prettier
        run: npm run format:check

      - name: Test + coverage (threshold >= 98%)
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify dist/ is up to date
        run: |
          if [ -n "$(git status --porcelain dist/)" ]; then
            echo "::error::dist/ is out of sync with src/. Run 'npm run build' and commit."
            git --no-pager diff dist/
            exit 1
          fi

      - name: Coverage summary
        if: matrix.node-version == 22
        run: |
          node -e '
            const s = require("./coverage/coverage-summary.json").total;
            const row = (k) => `| ${k} | ${s[k].pct}% | ${s[k].covered}/${s[k].total} |`;
            const md = ["## Coverage", "", "| Metric | % | Covered |", "|---|---|---|",
              row("statements"), row("branches"), row("functions"), row("lines")].join("\n");
            require("fs").appendFileSync(process.env.GITHUB_STEP_SUMMARY, md + "\n");
          '

      - name: Upload coverage report
        if: matrix.node-version == 22
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 14
